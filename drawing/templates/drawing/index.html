{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Air Sketch Pro | MediaPipe Vision</title>
    <link rel="stylesheet" href="{% static 'drawing/css/style.css' %}">
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    
    <style>
        .top-toolbar {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            background-color: rgba(0, 0, 0, 0.6);
            padding: 10px 20px;
            border-radius: 50px;
            backdrop-filter: blur(5px);
            z-index: 1000;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            align-items: center;
        }

        .color-option {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid transparent;
            transition: transform 0.2s, border-color 0.2s;
        }

        .color-option:hover {
            transform: scale(1.1);
        }

        .color-option.active {
            border-color: #ffffff;
            transform: scale(1.1);
        }

        .ui-bar {
            position: absolute;
            bottom: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
            z-index: 1000;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        
        .btn-save {
            background-color: #2ed573;
            color: white;
        }
    </style>
</head>
<body>
    <div class="canvas-container">
        <video id="webcam" autoplay playsinline style="position: absolute; opacity: 0; pointer-events: none;"></video>
        <canvas id="sketchCanvas"></canvas>

        <div class="top-toolbar">
            <div class="color-option active" style="background: #00ffcc;" onclick="pickColor('#00ffcc', this)"></div>
            <div class="color-option" style="background: #ff4757;" onclick="pickColor('#ff4757', this)"></div>
            <div class="color-option" style="background: #ffffff;" onclick="border: 2px solid #ccc; background: #ffffff;" onclick="pickColor('#ffffff', this)"></div>
            <div class="color-option" style="background: #ffeb3b;" onclick="pickColor('#ffeb3b', this)"></div>
            <div class="color-option" style="background: #e91e63;" onclick="pickColor('#e91e63', this)"></div>
        </div>

        <div class="ui-bar">
            <button class="btn" onclick="clearCanvas()">Clear Page</button>
            <button class="btn btn-save" onclick="saveSketch()">Save Artwork</button>
        </div>
    </div>

    <script src="{% static 'drawing/js/sketch.js' %}"></script>
</body>
</html>
